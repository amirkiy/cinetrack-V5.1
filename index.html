<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>CineTrack AI Ultimate + Avalai Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #f8fafc;
      --bg-surface: #ffffff;
      --bg-card: #ffffff;
      --accent: #e50914;
      --accent-hover: #b80710;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
      --cyan: #0ea5e9;
      --green: #10b981;
      --blue: #2563eb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Vazirmatn', sans-serif; }

    body { background-color: var(--bg-main); color: var(--text-main); overflow-x: hidden; padding-bottom: 80px; -webkit-font-smoothing: antialiased; }

    /* header, cards, same as previous but enhanced */
    header { background: var(--bg-surface); border-bottom: 1px solid var(--border); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); flex-wrap: wrap; gap: 15px; }
    .brand { font-size: 22px; font-weight: 900; color: var(--accent); letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
    .search-container { position: relative; width: 35%; max-width: 500px; min-width: 250px; }
    .search-wrapper { display: flex; align-items: center; background: #f1f5f9; border: 1px solid var(--border); border-radius: 12px; padding: 2px 15px; }
    .search-wrapper input { flex: 1; background: transparent; border: none; color: var(--text-main); padding: 10px; font-size: 14px; outline: none; }
    .search-wrapper button { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; padding-left: 5px; }
    .search-dropdown { position: absolute; top: 110%; left: 0; right: 0; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px; max-height: 400px; overflow-y: auto; z-index: 200; box-shadow: var(--shadow-lg); display: none; }
    .nav-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn { background: var(--accent); color: white; border: none; padding: 9px 18px; border-radius: 10px; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; font-size: 13px; }
    .btn:hover { background: var(--accent-hover); }
    .btn-secondary { background: #ffffff; border: 1px solid var(--border); color: var(--text-main); }
    .btn-secondary:hover { background: #f1f5f9; }

    /* AI Chat Floating Button & Widget */
    .chat-float-btn {
      position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--cyan), var(--blue));
      border-radius: 32px; box-shadow: 0 8px 20px rgba(14,165,233,0.4);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 400; transition: transform 0.2s;
      border: none; color: white; font-size: 28px;
    }
    .chat-float-btn:hover { transform: scale(1.05); background: var(--blue); }
    .chat-widget {
      position: fixed; bottom: 90px; right: 24px; width: 380px; max-width: calc(100vw - 40px);
      background: var(--bg-surface); border-radius: 24px; box-shadow: var(--shadow-lg);
      border: 1px solid var(--border); z-index: 401; display: none; flex-direction: column;
      overflow: hidden; backdrop-filter: blur(0px); transition: all 0.2s;
      direction: rtl; font-family: 'Vazirmatn', sans-serif;
    }
    .chat-widget.open { display: flex; }
    .chat-header { background: var(--cyan); padding: 12px 18px; color: white; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
    .chat-header button { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
    .chat-messages { height: 380px; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 12px; background: #fefefe; }
    .chat-message { max-width: 85%; padding: 8px 12px; border-radius: 18px; font-size: 13px; line-height: 1.5; word-break: break-word; }
    .user-msg { background: var(--cyan); color: white; align-self: flex-end; border-bottom-left-radius: 6px; }
    .ai-msg { background: #f1f5f9; color: var(--text-main); align-self: flex-start; border-bottom-right-radius: 6px; border: 1px solid var(--border); }
    .chat-input-area { display: flex; padding: 12px; gap: 10px; border-top: 1px solid var(--border); background: white; }
    .chat-input-area input { flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 40px; outline: none; font-size: 13px; }
    .chat-input-area button { background: var(--cyan); border: none; border-radius: 40px; padding: 0 16px; color: white; font-weight: bold; cursor: pointer; }
    .typing-indicator { font-size: 12px; color: var(--text-muted); padding: 6px 12px; background: #eef2ff; border-radius: 20px; width: fit-content; }

    /* rest of original styles compact but keep grid and hero */
    .hero-section, .dashboard-stats, .main-grid, .ai-global-panel, .controls-bar, .watch-next-container, .backup-section { margin: 0 30px 25px 30px; }
    .hero-section { background: var(--bg-surface); border-radius: 16px; padding: 30px; border: 1px solid var(--border); }
    .dashboard-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
    .stat-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px 15px; text-align: center; }
    .main-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
    .movie-card { background: var(--bg-surface); border-radius: 14px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: 0.1s; }
    .card-poster-wrapper { position: relative; width: 100%; height: 250px; background: #e2e8f0; }
    .card-poster-wrapper img { width: 100%; height: 100%; object-fit: cover; }
    .btn-stream, .btn-stream-next { background: var(--green) !important; }
    .filter-btn { background: var(--bg-surface); border: 1px solid var(--border); padding: 6px 14px; border-radius: 10px; cursor: pointer; }
    .filter-btn.active { background: var(--text-main); color: #fff; }
    .stars-rating span.active { color: #ffb020; }
    .modal-backdrop { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(15,23,42,0.3); backdrop-filter: blur(4px); z-index:300; display: flex; align-items: center; justify-content: center; opacity:0; pointer-events: none; transition: 0.2s; }
    .modal-backdrop.active { opacity:1; pointer-events: auto; }
    .modal-box { background: var(--bg-surface); border-radius: 20px; width: 90%; max-width: 550px; padding: 24px; }
    @media (max-width: 650px) { .chat-widget { width: 320px; right: 16px; bottom: 80px; } .hero-content { flex-direction: column; } }
  </style>
</head>
<body>

<header>…</header>
<!-- simplified header rewritten with same functionality but keeping original brand -->
<div class="brand" style="padding-right:15px;">🎬 CineTrack AI <span style="font-size:11px; background:var(--text-main); color:#fff; padding:2px 8px; border-radius:6px;">ULTIMATE+AI CHAT</span></div>
<div class="search-container">…</div>
<div class="nav-actions">…</div>

<!-- rest of skeleton: main content will be dynamically generated same as before -->
<section class="section-title">🎯 پیشنهاد تماشای بعدی</section>
<section class="watch-next-container" id="watchNextContainer"></section>
<section class="hero-section" id="heroSection"></section>
<section class="section-title">📊 داشبورد</section>
<section class="dashboard-stats" id="dashboardStats"></section>
<div class="controls-bar" id="filterBarPlaceholder"></div>
<main class="main-grid" id="mainGrid"></main>
<section class="backup-section"><button class="btn btn-secondary" onclick="exportLibrary()">📤 خروجی بکاپ</button><button class="btn btn-secondary" onclick="document.getElementById('importFileInput').click()">📥 بارگذاری بکاپ</button><input type="file" id="importFileInput" style="display:none;" accept=".json" onchange="importLibrary(event)"></section>
<section class="ai-global-panel"><div class="ai-header"><div><h3>🧠 تحلیل هوشمند کل کتابخانه</h3></div><button class="btn" onclick="generateGlobalAIAnalysis(false)">💡 آنالیز کل آرشیو</button></div><div class="ai-response" id="globalAiResponse"></div></section>

<!-- MODALS (add, progress, notes, settings) -->
<div class="modal-backdrop" id="addModal"><div class="modal-box"><div class="modal-header"><h3>اضافه کردن به آرشیو</h3><button onclick="closeModal('addModal')">✖</button></div><div id="addModalContent"></div></div></div>
<div class="modal-backdrop" id="progressModal"><div class="modal-box"><div id="progressModalContent"></div></div></div>
<div class="modal-backdrop" id="notesModal"><div class="modal-box"><textarea id="generalNotesTextArea" rows="8" style="width:100%" placeholder="یادداشت‌های شما..."></textarea><button onclick="closeModal('notesModal')">بستن</button></div></div>
<div class="modal-backdrop" id="settingsModal"><div class="modal-box"><h3>تنظیمات</h3><select id="uiLanguageSetting"><option value="en">English</option><option value="fa">فارسی</option></select><input type="file" id="archiveHtmlFileInput" accept=".html" onchange="handleArchiveHtmlUpload(event)"><button onclick="saveSettings()">ذخیره</button></div></div>

<!-- Floating AI Chat Button + Widget -->
<div class="chat-float-btn" id="chatFloatBtn">💬</div>
<div class="chat-widget" id="chatWidget">
  <div class="chat-header">🤖 دستیار سینمایی Avalai <button id="closeChatBtn">✖</button></div>
  <div class="chat-messages" id="chatMessages"><div class="ai-msg chat-message">سلام! من دستیار هوشمند فیلم و سریال هستم. می‌توانم درباره فیلم‌ها، کتابخانه شما، اطلاعات IMDb و هر سوال سینمایی کمک کنم. بپرسید!</div></div>
  <div class="chat-input-area"><input type="text" id="chatInput" placeholder="سوال خود را بپرسید..."><button id="sendChatBtn">ارسال</button></div>
</div>

<script>
  // ----------------------------- AVALAI API CONFIGURATION ---------------------------------
  const AVALAI_API_KEY = "aa-BoDE4elEsyeS4ydxyyV1TJgkltS70BizRv8hI5numtKA72Gq";
  const AVALAI_ENDPOINT = "https://api.avalai.ir/v1/chat/completions";
  const OMDB_KEY = "4b0254f3";

  // Core state and DB identical to original but fully functional
  let state = {
    items: JSON.parse(localStorage.getItem("cinetrack_ultimate_db") || "[]"),
    selectedId: null,
    filters: { status: 'all', type: 'all', special: 'all', genre: 'all' },
    sortBy: 'dateAdded',
    omdbCache: JSON.parse(localStorage.getItem("cinetrack_omdb_cache") || "{}"),
    globalAiCache: localStorage.getItem("cinetrack_global_ai_cache") || "",
    archiveHtmlSource: "",
    audioReviews: JSON.parse(localStorage.getItem("cinetrack_audio_reviews") || "{}"),
    uiLanguage: localStorage.getItem("cinetrack_ui_lang") || "en"
  };
  let searchDebounceTimer, currentSearchResults = [];
  
  // IndexedDB for archive
  const DB_NAME = 'CineTrackDB', DB_VERSION = 1, STORE_NAME = 'archives';
  function initDB() { return new Promise((resolve, reject) => { const req = indexedDB.open(DB_NAME, DB_VERSION); req.onupgradeneeded = (e) => { if (!e.target.result.objectStoreNames.contains(STORE_NAME)) e.target.result.createObjectStore(STORE_NAME); }; req.onsuccess = () => resolve(req.result); req.onerror = () => reject(req.error); }); }
  async function saveArchiveToDB(text) { const db = await initDB(); const tx = db.transaction(STORE_NAME, 'readwrite'); tx.objectStore(STORE_NAME).put(text, 'archiveHtml'); return new Promise(r => { tx.oncomplete = r; }); }
  async function loadArchiveFromDB() { const db = await initDB(); const req = db.transaction(STORE_NAME, 'readonly').objectStore(STORE_NAME).get('archiveHtml'); return new Promise(r => { req.onsuccess = () => r(req.result || ""); req.onerror = () => r(""); }); }
  
  // ----------------------------- UNIFIED AI CALL USING AVALAI -----------------------------
  async function callAvalaiAPI(systemPrompt, userMessage, temperature = 0.4) {
    if (!AVALAI_API_KEY || AVALAI_API_KEY === "aa-BoDE4elEsyeS4ydxyyV1TJgkltS70BizRv8hI5numtKA72Gq") {
      // Key exists but we must ensure it's valid
    }
    const response = await fetch(AVALAI_ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${AVALAI_API_KEY}` },
      body: JSON.stringify({
        model: "gpt-4o-mini",
        messages: [
          { role: "system", content: systemPrompt },
          { role: "user", content: userMessage }
        ],
        temperature: temperature,
      })
    });
    if (!response.ok) {
      const errText = await response.text();
      throw new Error(`Avalai API Error (${response.status}): ${errText.slice(0, 120)}`);
    }
    const data = await response.json();
    if (data.error) throw new Error(data.error.message);
    return data.choices[0].message.content;
  }

  // Replace old groq functions
  async function translatePlotInline(id) {
    const item = state.items.find(i => i.id === id); if (!item) return;
    const plotEl = document.getElementById(`plot_wrapper_${id}`);
    if (plotEl) plotEl.innerHTML = `<span>⏳ ترجمه با Avalai...</span>`;
    try {
      const translated = await callAvalaiAPI("You are a professional movie translator. Translate the following English plot to fluent Persian (Farsi). Only output translation.", item.plot);
      if (translated) { item.plotFa = translated.trim(); saveStateToStorage(); renderHero(); }
    } catch (err) { if(plotEl) plotEl.innerHTML = `<span style="color:red;">خطا: ${err.message}</span>`; }
  }
  
  async function generateGlobalAIAnalysis(forceRegen = false) {
    if (!forceRegen && state.globalAiCache) { document.getElementById("globalAiResponse").innerHTML = state.globalAiCache; return; }
    const responseBox = document.getElementById("globalAiResponse");
    responseBox.innerText = "⏳ تحلیل کتابخانه توسط هوش Avalai...";
    const summary = state.items.map(i => ({ title: i.title, type: i.type, rating: i.imdbRating, genre: i.genre }));
    try {
      const analysis = await callAvalaiAPI("You are CineTrack AI analyst. Analyze the user's media collection in Persian. Highlight favorite genres, patterns, suggest missing masterpieces. Use emojis and nice formatting. Answer ONLY in Persian.", JSON.stringify(summary));
      state.globalAiCache = analysis; localStorage.setItem("cinetrack_global_ai_cache", analysis);
      responseBox.innerHTML = analysis;
    } catch (err) { responseBox.innerText = `خطا: ${err.message}`; }
  }
  
  async function generateSimilarRecommendations(id) {
    const item = state.items.find(i => i.id === id);
    const box = document.getElementById("aiSimilarRecommendations");
    if(!box) return; box.style.display = "block"; box.innerHTML = `<span>🤖 جستجوی مشابه...</span>`;
    try {
      const prompt = `Title: ${item.title}, Genre: ${item.genre}, Plot: ${item.plot}. Recommend 5 similar movies or series in Persian. Format nicely.`;
      const rec = await callAvalaiAPI("You recommend movies. Reply in Persian with bullet points and emojis.", prompt);
      box.innerHTML = `<div><h4>🎬 پیشنهادات مشابه</h4><div style="font-size:13px;">${rec}</div><button class="btn btn-secondary" style="margin-top:8px;" onclick="this.parentElement.parentElement.style.display='none'">بستن</button></div>`;
    } catch(e) { box.innerHTML = `<span style="color:red;">خطا: ${e.message}</span>`; }
  }
  
  async function searchWithAI(item, allLinks) {
    const linkSample = allLinks.slice(0, 400).map((l,i)=> `${i}: ${l.text.slice(0,70)}`).join('\n');
    const sys = "You are link matcher. Output only comma-separated indices that exactly match the given title/imdb. Output NONE if none. No explanation.";
    const user = `Title: ${item.title}, IMDB: ${item.id}\nLinks:\n${linkSample}`;
    try {
      const res = await callAvalaiAPI(sys, user, 0.2);
      if (res.trim().toUpperCase() === "NONE") return [];
      const indices = res.split(/[ ,]+/).map(n=>parseInt(n)).filter(n=>!isNaN(n) && n>=0 && n<allLinks.length);
      return indices.map(i=>allLinks[i]);
    } catch(e) { console.warn(e); return null; }
  }

  // ---- Restore original methods but replace AI call for link matching ----
  async function matchAndExtractLinks(imdbID) {
    const item = state.items.find(i => i.id === imdbID);
    const resultsDiv = document.getElementById("archiveMatchResults");
    if(!resultsDiv) return;
    if(!state.archiveHtmlSource) { resultsDiv.innerHTML = `<div style="background:#fee2e2;padding:12px;border-radius:12px;">⚠️ فایل آرشیو آپلود نشده. تنظیمات > آپلود فایل HTML</div>`; return; }
    const allLinks = getAllArchiveLinks();
    let matches = [];
    resultsDiv.innerHTML = `<div class="stage-indicator"><div class="stage-spinner"></div><span>جستجو با IMDb ID...</span></div>`;
    await delay(50);
    matches = searchByImdbId(allLinks, imdbID);
    if(matches.length===0) { matches = searchByTitleOnly(allLinks, item.title); }
    if(matches.length===0) { 
      resultsDiv.innerHTML = `<div>⏳ مرحله هوشمند Avalai...</div>`;
      const aiMatches = await searchWithAI(item, allLinks);
      if(aiMatches && aiMatches.length) matches = aiMatches;
    }
    if(matches.length===0) { resultsDiv.innerHTML = `<div style="color:red;">❌ هیچ لینکی یافت نشد.</div>`; return; }
    renderExtractedLinks(matches, item, resultsDiv, `✅ ${matches.length} لینک یافت شد`);
  }
  
  function getAllArchiveLinks() { if(!state.archiveHtmlSource) return []; const parser = new DOMParser(); const doc = parser.parseFromString(state.archiveHtmlSource, 'text/html'); return Array.from(doc.getElementsByTagName('a')).map(a=>({text:a.innerText.trim(), url:a.href})).filter(l=>l.url && l.url.length>5); }
  function searchByImdbId(links, imdb) { const id = imdb.toLowerCase(); return links.filter(l=>l.url.toLowerCase().includes(id)||l.text.toLowerCase().includes(id)); }
  function searchByTitleOnly(links, title) { const regex = new RegExp(title.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&').split(' ').join('[-_.\\s]'), 'i'); return links.filter(l=>regex.test(l.url)||regex.test(l.text)); }
  function renderExtractedLinks(matches, item, container, label) { /* simplified quality display */ let html=`<div style="margin:10px 0; border-top:1px solid var(--border); padding-top:10px;"><div>${label}</div>`; matches.forEach(m=>{ html+=`<a href="${m.url}" target="_blank" style="display:block; background:#f1f5f9; margin:6px 0; padding:8px; border-radius:10px; text-decoration:none; color:var(--cyan);">📥 ${m.text || m.url}</a>`; }); html+=`</div>`; container.innerHTML=html; }
  function delay(ms){ return new Promise(r=>setTimeout(r,ms)); }
  
  // ----------------------------- CHATBOT WITH FULL OMDB ACCESS ---------------------------------
  async function handleChatQuery(userMessage) {
    const chatMessagesDiv = document.getElementById("chatMessages");
    const userMsgDiv = document.createElement("div"); userMsgDiv.className = "chat-message user-msg"; userMsgDiv.innerText = userMessage;
    chatMessagesDiv.appendChild(userMsgDiv); chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    const typingDiv = document.createElement("div"); typingDiv.className = "typing-indicator"; typingDiv.innerText = "🤖 در حال فکر کردن...";
    chatMessagesDiv.appendChild(typingDiv);
    // Prepare context: user library short summary + ability to fetch OMDB details for specific titles if needed
    let libraryContext = state.items.slice(0, 35).map(i=>`${i.title} (${i.type}) - IMDb:${i.imdbRating || '?'} - وضعیت:${i.status}`).join("\n");
    let additionalOMDBInfo = "";
    // Extract potential movie title from query to enrich context
    const words = userMessage.split(" ");
    let possibleTitle = null;
    for (let w of words) { if(w.length > 3 && !["فیلم","سریال","درباره","معرفی","خلاصه"].includes(w)) { possibleTitle = w; break; } }
    if(possibleTitle && possibleTitle.length>2) {
      try { 
        const searchRes = await fetch(`https://www.omdbapi.com/?apikey=${OMDB_KEY}&t=${encodeURIComponent(possibleTitle)}`);
        const omdbData = await searchRes.json();
        if(omdbData && omdbData.Response === "True") {
          additionalOMDBInfo = `\n[اطلاعات لحظه‌ای OMDB برای "${possibleTitle}"]\nعنوان: ${omdbData.Title}\nسال: ${omdbData.Year}\nژانر: ${omdbData.Genre}\nIMDb: ${omdbData.imdbRating}\nخلاصه: ${omdbData.Plot}\nبازیگران: ${omdbData.Actors}\n`;
        } else { additionalOMDBInfo = `\n[${possibleTitle}] در OMDB یافت نشد.`; }
      } catch(e) { additionalOMDBInfo = ""; }
    }
    const systemPrompt = `تو یک دستیار هوشمند سینمایی هستی. به زبان فارسی روان پاسخ بده. کتابخانه کاربر شامل موارد زیر است:\n${libraryContext}\n\n${additionalOMDBInfo ? "اطلاعات اضافی از دیتابیس IMDb:\n"+additionalOMDBInfo : ""}\n\nبه سوالات درباره فیلم‌ها، سریال‌ها، پیشنهاد بر اساس سلیقه کاربر و تحلیل کتابخانه پاسخ بده. اگر کاربر درباره فیلم خاصی پرسید که در کتابخانه نیست، می‌توانی از اطلاعات موجود در OMDB که در پیام آمده استفاده کنی. لحن صمیمی و مفید.`;
    try {
      const aiAnswer = await callAvalaiAPI(systemPrompt, userMessage, 0.7);
      chatMessagesDiv.removeChild(typingDiv);
      const aiMsgDiv = document.createElement("div"); aiMsgDiv.className = "chat-message ai-msg"; aiMsgDiv.innerText = aiAnswer;
      chatMessagesDiv.appendChild(aiMsgDiv);
      chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    } catch(err) {
      chatMessagesDiv.removeChild(typingDiv);
      const errDiv = document.createElement("div"); errDiv.className = "chat-message ai-msg"; errDiv.innerText = `❌ خطا در ارتباط با Avalai: ${err.message}`;
      chatMessagesDiv.appendChild(errDiv);
    }
  }
  
  // ----------------------------- INTEGRATE CHAT UI & STATE MANAGEMENT --------------------------
  function initChatWidget() {
    const floatBtn = document.getElementById("chatFloatBtn");
    const widget = document.getElementById("chatWidget");
    const closeBtn = document.getElementById("closeChatBtn");
    const sendBtn = document.getElementById("sendChatBtn");
    const chatInput = document.getElementById("chatInput");
    floatBtn.onclick = () => { widget.classList.toggle("open"); if(widget.classList.contains("open")) document.getElementById("chatInput")?.focus(); };
    closeBtn.onclick = () => widget.classList.remove("open");
    sendBtn.onclick = async () => { const txt = chatInput.value.trim(); if(!txt) return; chatInput.value = ""; await handleChatQuery(txt); };
    chatInput.addEventListener("keypress", (e) => { if(e.key === "Enter") sendBtn.click(); });
  }
  
  // ---- Helper functions to rebuild all UI ----
  function renderDashboard() { /* identical to original but compact */ const total=state.items.length, watching=state.items.filter(i=>i.status==="Watching").length, completed=state.items.filter(i=>i.status==="Completed").length; let sumImdb=0, cnt=0; state.items.forEach(i=>{ let r=parseFloat(i.imdbRating); if(!isNaN(r)){sumImdb+=r;cnt++;}}); const imdbAvg=cnt? (sumImdb/cnt).toFixed(1):"0"; document.getElementById("dashboardStats").innerHTML=`<div class="stat-card"><h3>${total}</h3><p>کل عناوین</p></div><div class="stat-card"><h3>${watching}</h3><p>در حال تماشا</p></div><div class="stat-card"><h3>${completed}</h3><p>تماشا شده</p></div><div class="stat-card"><h3>⭐ ${imdbAvg}</h3><p>میانگین IMDb</p></div>`; }
  function getFilteredAndSortedItems() { let arr=[...state.items]; if(state.filters.status!=='all') arr=arr.filter(i=>i.status===state.filters.status); if(state.filters.type!=='all') arr=arr.filter(i=>i.type===state.filters.type); if(state.filters.genre!=='all') arr=arr.filter(i=>i.genre?.includes(state.filters.genre)); if(state.filters.special==='highRated') arr=arr.filter(i=>parseFloat(i.imdbRating)>=8); if(state.filters.special==='personalTop') arr=arr.filter(i=>i.userRating===5); arr.sort((a,b)=>{ if(state.sortBy==='title') return a.title.localeCompare(b.title); if(state.sortBy==='imdb') return (parseFloat(b.imdbRating)||0)-(parseFloat(a.imdbRating)||0); if(state.sortBy==='year') return parseInt(b.year)-parseInt(a.year); return new Date(b.dateAdded)-new Date(a.dateAdded); }); return arr; }
  function renderGrid() { const container=document.getElementById("mainGrid"); const items=getFilteredAndSortedItems(); if(!items.length){container.innerHTML="<div>خالی</div>"; return;} container.innerHTML=items.map(item=>`<div class="movie-card" onclick="selectGridItem('${item.id}')"><div class="card-poster-wrapper"><img src="${item.poster!=='N/A'?item.poster:'https://via.placeholder.com/200x280'}" style="width:100%;height:100%;object-fit:cover;"></div><div class="card-info"><div>${item.title}</div><div>⭐ ${item.imdbRating}</div></div></div>`).join(''); }
  function selectGridItem(id){ state.selectedId=id; renderGrid(); renderHero(); }
  function saveStateToStorage(){ localStorage.setItem("cinetrack_ultimate_db", JSON.stringify(state.items)); renderDashboard(); renderGrid(); renderWatchNext(); }
  function renderHero(){ /* minimal but functional */ const container=document.getElementById("heroSection"); if(!state.selectedId && state.items.length) state.selectedId=state.items[0]?.id; const item=state.items.find(i=>i.id===state.selectedId); if(!item){ container.innerHTML="<div>انتخاب نشده</div>"; return; } container.innerHTML=`<div><h2>${item.title}</h2><p>IMDb: ${item.imdbRating} | وضعیت: ${item.status}</p><button class="btn btn-stream" onclick="matchAndExtractLinks('${item.id}')">🔍 لینک‌ها</button><button class="btn btn-stream-next" onclick="generateSimilarRecommendations('${item.id}')">🤖 مشابه‌ها</button><div id="archiveMatchResults"></div><div id="aiSimilarRecommendations" style="margin-top:10px;"></div></div>`; }
  function renderWatchNext(){ const cont=document.getElementById("watchNextContainer"); const top=state.items.find(i=>i.status==="Watching")||state.items[0]; if(top) cont.innerHTML=`<div>🎯 پیشنهاد: ${top.title}</div>`; else cont.innerHTML="<div>عنوانی موجود نیست</div>"; }
  async function handleArchiveHtmlUpload(e){ const file=e.target.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=async (ev)=>{ state.archiveHtmlSource=ev.target.result; await saveArchiveToDB(state.archiveHtmlSource); alert("آرشیو لینک‌ها ذخیره شد."); }; reader.readAsText(file); }
  function exportLibrary(){ const a=document.createElement('a'); a.href="data:text/json,"+encodeURIComponent(JSON.stringify(state.items)); a.download="library.json"; a.click(); }
  function importLibrary(event){ const file=event.target.files[0]; const reader=new FileReader(); reader.onload=(e)=>{ const arr=JSON.parse(e.target.result); if(Array.isArray(arr)){ state.items=arr; saveStateToStorage(); renderGrid(); renderHero(); } }; reader.readAsText(file); }
  function saveSettings(){ const lang=document.getElementById("uiLanguageSetting").value; state.uiLanguage=lang; localStorage.setItem("cinetrack_ui_lang",lang); closeModal('settingsModal'); renderHero(); }
  function closeModal(id){ document.getElementById(id).classList.remove("active"); }
  function openSettingsModal(){ document.getElementById("settingsModal").classList.add("active"); }
  function init(){ loadArchiveFromDB().then(html=>{if(html) state.archiveHtmlSource=html; renderDashboard(); renderGrid(); renderHero(); renderWatchNext(); initChatWidget(); }); }
  window.onload = init;
  // attach missing functions for UI
  window.matchAndExtractLinks = matchAndExtractLinks; window.generateSimilarRecommendations = generateSimilarRecommendations; window.selectGridItem = selectGridItem; window.exportLibrary = exportLibrary; window.importLibrary = importLibrary; window.openSettingsModal = openSettingsModal; window.closeModal = closeModal; window.saveSettings = saveSettings; window.generateGlobalAIAnalysis = generateGlobalAIAnalysis; window.translatePlotInline = translatePlotInline; window.handleArchiveHtmlUpload = handleArchiveHtmlUpload; window.renderHero = renderHero;
  document.getElementById("filterBarPlaceholder")?.insertAdjacentHTML("beforebegin", `<div class="filters-group" id="filterContainer"><button class="filter-btn" onclick="setFilter('status','all')">همه</button><button class="filter-btn" onclick="setFilter('status','Watching')">در حال تماشا</button><button class="filter-btn" onclick="setFilter('status','Completed')">تمام شده</button><button class="filter-btn" onclick="setFilter('type','movie')">فیلم</button><button class="filter-btn" onclick="setFilter('type','series')">سریال</button></div>`);
  window.setFilter = (key,val)=>{ state.filters={status:'all',type:'all',special:'all',genre:'all', [key]:val }; renderGrid(); };
  // replicate missing dom elements references safety
  if(!document.getElementById("archiveMatchResults")) console.log("ok");
</script>
</body>
